<header class="aplicacion__cabecera">
  <h1 class="aplicacion__titulo">Mis Tareas Diarias</h1>
  <p class="aplicacion__descripcion">Organiza tu día a día fácilmente.</p>
  
  <nav class="aplicacion__nav">
    <ul class="nav-lista">
      
      @if (!router.url.includes('/lista')) {
        <li>
          <a routerLink="/lista" class="boton boton--secundario">
            Ver mis Notas
          </a>
        </li>
      }

      @if (!router.url.includes('/formulario') && !router.url.includes('/editar')) {
        <li>
          <a routerLink="/formulario" class="boton boton--primario">
            + Nueva Nota
          </a>
        </li>
      }
      
    </ul>
  </nav>
</header>

<main class="aplicacion">
  <router-outlet></router-outlet>
</main>
